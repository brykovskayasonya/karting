# Запуск всего проекта одной командой:
#   docker compose up --build
# Затем открыть в браузере: http://localhost:3000
#
# Что поднимается:
#   db  — Postgres
#   api — Go-бэкенд на :8080
#   web — собранный веб-клиент (Compose Multiplatform / wasmJs), отдаётся nginx на :3000

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: volna
      POSTGRES_USER: volna
      POSTGRES_PASSWORD: volna
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volna -d volna"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    image: golang:1.25-alpine
    working_dir: /src
    environment:
      DATABASE_URL: "postgres://volna:volna@db:5432/volna?sslmode=disable"
    volumes:
      - ./backend:/src
    depends_on:
      db:
        condition: service_healthy
    command: go run github.com/pressly/goose/v3/cmd/goose@v3.24.1 -dir migrations postgres "postgres://volna:volna@db:5432/volna?sslmode=disable" up

  api:
    build: ./backend
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://volna:volna@db:5432/volna?sslmode=disable"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ./client
      dockerfile: webApp/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres-data:
